name: SDK Tests

on:
  push:
    branches: [ "main" ,"dev"]
  pull_request:
    branches: [ "main" , "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sdk

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: sdk/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run smoke tests
      run: npm test
